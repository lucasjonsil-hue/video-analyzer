<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planner — Life Hacker 3000</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 720px;
      height: fit-content;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { color: #6b6b8a; font-size: 0.875rem; margin-bottom: 2rem; }

    .input-row { display: flex; gap: 0.75rem; }

    input[type="text"] {
      flex: 1;
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: #e8e8f0;
      font-size: 0.95rem;
    }
    input[type="text"]:focus { outline: none; border-color: #a78bfa; }

    button {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.4rem;
      color: #0f0f13;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: wait; }

    .status { margin-top: 1rem; color: #6b6b8a; font-size: 0.875rem; min-height: 1.2em; }
    .status.error { color: #f87171; }

    .result { margin-top: 1.5rem; display: none; }
    .result.visible { display: block; }

    .event-header {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #2a2a3a;
    }
    .event-header .date { color: #a78bfa; }

    .plan { margin-bottom: 1.5rem; }
    .plan h2 { font-size: 1rem; color: #a78bfa; margin-bottom: 0.4rem; }
    .plan .desc { color: #b8b8cc; font-size: 0.9rem; margin-bottom: 0.75rem; }

    .phase { margin-bottom: 0.6rem; }
    .phase .label { font-weight: 700; font-size: 0.85rem; color: #60a5fa; }
    .phase ul, .packing ul { margin: 0.25rem 0 0 1.25rem; font-size: 0.875rem; color: #d0d0e0; }
    .phase li, .packing li { margin-bottom: 0.15rem; }

    .packing .label { font-weight: 700; font-size: 0.85rem; color: #34d399; }

    .saved-badge { font-size: 0.8rem; color: #34d399; margin-top: 0.5rem; }
    .nav { margin-top: 2rem; font-size: 0.85rem; }
    .nav a { color: #6b6b8a; text-decoration: none; margin-right: 1rem; }
    .nav a:hover { color: #a78bfa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Planner</h1>
    <p class="subtitle">Name an upcoming activity — "spearfishing Tuesday", "chem final next Friday" — and get a prep plan. Trips get Plan A / Plan B / Fancy.</p>

    <form id="plan-form">
      <div class="input-row">
        <input type="text" id="plan-text" placeholder="What's coming up?" required />
        <button type="submit" id="plan-btn">Plan it</button>
      </div>
    </form>
    <div class="status" id="status"></div>

    <div class="result" id="result">
      <div class="event-header" id="event-header"></div>
      <div id="plans"></div>
      <div class="saved-badge" id="saved-badge"></div>
    </div>

    <div class="nav">
      <a href="/">← Analyzer</a>
      <a href="/notes">Notes</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('plan-form');
    const input = document.getElementById('plan-text');
    const btn = document.getElementById('plan-btn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      status.textContent = 'Planning… (this can take a minute)';
      status.classList.remove('error');
      result.classList.remove('visible');

      try {
        const body = new FormData();
        body.append('text', input.value);
        const resp = await fetch('/api/plan', { method: 'POST', body });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `Request failed (${resp.status})`);
        }
        render(await resp.json());
        status.textContent = '';
      } catch (err) {
        status.textContent = err.message;
        status.classList.add('error');
      } finally {
        btn.disabled = false;
      }
    });

    function render(plan) {
      document.getElementById('event-header').innerHTML =
        `${esc(plan.event_title)} — <span class="date">${esc(plan.event_date)}</span>`;

      const plansEl = document.getElementById('plans');
      plansEl.innerHTML = '';
      for (const p of plan.plans) {
        const div = document.createElement('div');
        div.className = 'plan';
        let html = `<h2>${esc(p.name)}</h2><div class="desc">${esc(p.description)}</div>`;
        for (const phase of p.timeline) {
          html += `<div class="phase"><span class="label">${esc(phase.phase)}</span><ul>` +
            phase.items.map(i => `<li>${esc(i)}</li>`).join('') + '</ul></div>';
        }
        if (p.packing && p.packing.length) {
          html += `<div class="packing"><span class="label">Packing</span><ul>` +
            p.packing.map(i => `<li>${esc(i)}</li>`).join('') + '</ul></div>';
        }
        div.innerHTML = html;
        plansEl.appendChild(div);
      }

      document.getElementById('saved-badge').textContent =
        plan.note_saved ? 'Saved to GitHub notes ✓' : 'Not saved to GitHub (check GITHUB_TOKEN)';
      result.classList.add('visible');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }
  </script>
</body>
</html>
