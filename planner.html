<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planner — Life Hacker 3000</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 860px; margin: 0 auto; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { color: #6b6b8a; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .subtitle a { color: #a78bfa; text-decoration: none; }
    .subtitle a:hover { text-decoration: underline; }

    #event-input {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      color: #e8e8f0;
      border-radius: 10px;
      padding: 0.75rem 0.9rem;
      font-size: 0.95rem;
      width: 100%;
      min-height: 70px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      margin-bottom: 0.75rem;
    }
    #event-input:focus { border-color: #a78bfa; }

    .btn {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      color: #0f0f13;
      font-weight: 700;
      font-size: 0.9rem;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.5; cursor: wait; }

    .btn-secondary {
      background: #1a1a24;
      border: 1px solid #a78bfa;
      color: #d6c8ff;
      font-weight: 600;
      font-size: 0.85rem;
      border-radius: 10px;
      padding: 0.55rem 1.2rem;
      cursor: pointer;
    }
    .btn-secondary:disabled { opacity: 0.5; cursor: wait; }

    .status { color: #6b6b8a; font-size: 0.85rem; margin: 1rem 0; }
    .status.error { color: #f87171; }
    .status.ok { color: #6ee7b7; }

    .plan-header { margin: 1.5rem 0 0.9rem; }
    .plan-header h2 { font-size: 1.15rem; color: #e8e8f0; }
    .plan-header .date { color: #fcd34d; font-size: 0.85rem; margin-top: 0.2rem; }

    .plan-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      padding: 1.25rem 1.4rem;
      margin-bottom: 0.9rem;
    }

    .plan-name {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 0.2rem 0.65rem;
      display: inline-block;
      margin-bottom: 0.6rem;
      background: rgba(167, 139, 250, 0.14);
      color: #c4b5fd;
    }
    .plan-card.plan-b .plan-name { background: rgba(96, 165, 250, 0.12); color: #93c5fd; }
    .plan-card.fancy .plan-name { background: rgba(251, 191, 36, 0.12); color: #fcd34d; }

    .plan-summary { font-size: 0.9rem; line-height: 1.55; color: #d4d4e4; margin-bottom: 0.8rem; }

    .timeline-group { margin-bottom: 0.55rem; }
    .timeline-when { color: #a78bfa; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
    ul.items { padding-left: 1.2rem; margin-top: 0.15rem; }
    ul.items li { font-size: 0.85rem; line-height: 1.6; color: #b8b8cc; }

    .packing { margin-top: 0.7rem; font-size: 0.85rem; color: #b8b8cc; line-height: 1.6; }
    .packing strong { color: #6ee7b7; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }

    #save-row { margin: 0.5rem 0 2rem; }

    .nudges {
      background: rgba(251, 191, 36, 0.08);
      border: 1px solid rgba(251, 191, 36, 0.35);
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      line-height: 1.7;
      color: #fcd34d;
      margin-bottom: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Planner</h1>
    <p class="subtitle">
      Tell it what's coming up — it plans backward from the date.
      &middot; <a href="/">Analyzer</a> &middot; <a href="/notes">Notes</a> &middot; <a href="/invest">Invest</a>
    </p>

    <textarea id="event-input" placeholder='e.g. "spearfishing Tuesday" or "visiting a friend in Santa Barbara next weekend" or "chem final on the 24th"'></textarea>
    <button class="btn" id="generate-btn">Generate plan</button>

    <div class="status" id="status"></div>
    <div id="result"></div>
    <div id="save-row" style="display:none">
      <button class="btn-secondary" id="save-btn">Save to notes (GitHub)</button>
    </div>
  </div>

  <script>
    const input = document.getElementById("event-input");
    const generateBtn = document.getElementById("generate-btn");
    const saveBtn = document.getElementById("save-btn");
    const saveRow = document.getElementById("save-row");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    let currentPlan = null;

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (cls ? " " + cls : "");
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s == null ? "" : String(s);
      return d.innerHTML;
    }

    function render(plan) {
      let html = `<div class="plan-header"><h2>${esc(plan.title)}</h2><div class="date">${esc(plan.event_date)}</div></div>`;
      if (plan.gear_nudges && plan.gear_nudges.length) {
        html += `<div class="nudges">${plan.gear_nudges.map(n => `⚠️ ${esc(n)}`).join("<br>")}</div>`;
      }
      for (const p of plan.plans || []) {
        const cls = (p.name || "").toLowerCase().includes("fancy") ? "fancy"
                  : (p.name || "").toLowerCase().includes("b") ? "plan-b" : "";
        html += `<div class="plan-card ${cls}">`;
        html += `<span class="plan-name">${esc(p.name)}</span>`;
        if (p.summary) html += `<div class="plan-summary">${esc(p.summary)}</div>`;
        for (const g of p.timeline || []) {
          html += `<div class="timeline-group"><span class="timeline-when">${esc(g.when)}</span><ul class="items">`;
          for (const item of g.items || []) html += `<li>${esc(item)}</li>`;
          html += `</ul></div>`;
        }
        if (p.packing && p.packing.length) {
          html += `<div class="packing"><strong>Packing</strong> — ${p.packing.map(esc).join(", ")}</div>`;
        }
        html += `</div>`;
      }
      resultEl.innerHTML = html;
    }

    generateBtn.addEventListener("click", async () => {
      const text = input.value.trim();
      if (!text) { setStatus("Type something first.", "error"); return; }
      generateBtn.disabled = true;
      saveRow.style.display = "none";
      resultEl.innerHTML = "";
      setStatus("Planning…");
      try {
        const body = new FormData();
        body.append("text", text);
        const resp = await fetch("/api/plan", { method: "POST", body });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }
        currentPlan = await resp.json();
        render(currentPlan);
        setStatus("");
        saveRow.style.display = "block";
        saveBtn.disabled = false;
        saveBtn.textContent = "Save to notes (GitHub)";
      } catch (e) {
        setStatus("Failed: " + e.message, "error");
      } finally {
        generateBtn.disabled = false;
      }
    });

    saveBtn.addEventListener("click", async () => {
      if (!currentPlan) return;
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving…";
      try {
        const resp = await fetch("/api/plan/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(currentPlan),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        if (data.saved) {
          saveBtn.textContent = "Saved ✓";
          setStatus("Committed to notes/planner.md on GitHub.", "ok");
        } else {
          throw new Error("GITHUB_TOKEN not configured");
        }
      } catch (e) {
        saveBtn.disabled = false;
        saveBtn.textContent = "Save to notes (GitHub)";
        setStatus("Save failed: " + e.message, "error");
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); generateBtn.click(); }
    });
  </script>
</body>
</html>
