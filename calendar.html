<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — Life Hacker 3000</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 860px; margin: 0 auto; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { color: #6b6b8a; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .subtitle a { color: #a78bfa; text-decoration: none; }
    .subtitle a:hover { text-decoration: underline; }

    .add-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      padding: 1.1rem 1.4rem;
      margin-bottom: 1.5rem;
    }
    .add-controls { display: flex; gap: 0.7rem; flex-wrap: wrap; align-items: flex-end; }
    .add-controls label { display: block; font-size: 0.72rem; color: #b8b8cc; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .add-controls input {
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      color: #e8e8f0;
      border-radius: 8px;
      padding: 0.5rem 0.7rem;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
      color-scheme: dark;
    }
    .add-controls input:focus { border-color: #a78bfa; }
    #ev-title { width: 280px; }

    .quick-row { display: flex; gap: 0.7rem; margin-bottom: 0.9rem; }
    #quick-input {
      flex: 1;
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      color: #e8e8f0;
      border-radius: 8px;
      padding: 0.5rem 0.7rem;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }
    #quick-input:focus { border-color: #a78bfa; }
    .manual-label { color: #6b6b8a; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 0.5rem; }

    .btn {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      color: #0f0f13;
      font-weight: 700;
      font-size: 0.9rem;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.5; cursor: wait; }

    .status { color: #6b6b8a; font-size: 0.85rem; margin: 0.8rem 0 0; min-height: 1.1em; }
    .status.error { color: #f87171; }
    .status.ok { color: #6ee7b7; }

    .day-group { margin-bottom: 1rem; }
    .day-head {
      color: #a78bfa;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.4rem;
    }
    .day-head.today { color: #6ee7b7; }
    .event-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .event-time { color: #fcd34d; font-size: 0.8rem; font-weight: 700; min-width: 62px; }
    .event-title { font-size: 0.9rem; color: #e8e8f0; flex: 1; }
    .event-del {
      background: none;
      border: none;
      color: #6b6b8a;
      font-size: 1rem;
      cursor: pointer;
      padding: 0.1rem 0.4rem;
    }
    .event-del:hover { color: #f87171; }

    .empty { color: #6b6b8a; font-size: 0.9rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calendar</h1>
    <p class="subtitle">
      Your schedule, stored only on this machine. The planner reads it so prep plans fit around your week.
      &middot; <a href="/">🏠 Home</a> &middot; <a href="/planner">Planner</a> &middot; <a href="/gym">Gym</a> &middot; <a href="/invest">Invest</a> &middot; <a href="/notes">Notes</a>
    </p>

    <div class="add-card">
      <div class="quick-row">
        <input type="text" id="quick-input" placeholder='Just type it — "dentist tuesday at 2pm and surfing with Jake saturday"'>
        <button class="btn" id="quick-btn">Add it</button>
      </div>
      <div class="manual-label">or fill it in by hand:</div>
      <div class="add-controls">
        <div><label>What</label><input type="text" id="ev-title" placeholder="Chem final, dentist, surf with Jake…"></div>
        <div><label>Date</label><input type="date" id="ev-date"></div>
        <div><label>Time (optional)</label><input type="time" id="ev-time"></div>
        <button class="btn" id="add-btn">Add</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div id="events"></div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const eventsEl = document.getElementById("events");
    const titleIn = document.getElementById("ev-title");
    const dateIn = document.getElementById("ev-date");
    const timeIn = document.getElementById("ev-time");

    dateIn.value = new Date().toLocaleDateString("sv");  // today, YYYY-MM-DD local

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (cls ? " " + cls : "");
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s == null ? "" : String(s);
      return d.innerHTML;
    }

    function fmtTime(t) {
      if (!t) return "all day";
      const [h, m] = t.split(":").map(Number);
      const ampm = h >= 12 ? "PM" : "AM";
      return `${((h + 11) % 12) + 1}:${String(m).padStart(2, "0")} ${ampm}`;
    }

    function render(data) {
      const events = data.events || [];
      if (!events.length) {
        eventsEl.innerHTML = '<div class="empty">Nothing coming up — add your first event above.</div>';
        return;
      }
      const byDay = {};
      for (const e of events) (byDay[e.date] = byDay[e.date] || []).push(e);
      let html = "";
      for (const day of Object.keys(byDay).sort()) {
        const label = new Date(day + "T12:00:00").toLocaleDateString([], { weekday: "long", month: "short", day: "numeric" });
        const isToday = day === data.today;
        html += `<div class="day-group"><div class="day-head${isToday ? " today" : ""}">${isToday ? "Today — " : ""}${esc(label)}</div>`;
        for (const e of byDay[day]) {
          html += `<div class="event-card"><span class="event-time">${esc(fmtTime(e.time))}</span>` +
                  `<span class="event-title">${esc(e.title)}</span>` +
                  `<button class="event-del" data-id="${esc(e.id)}" title="Delete">✕</button></div>`;
        }
        html += `</div>`;
      }
      eventsEl.innerHTML = html;
    }

    async function refresh() {
      const resp = await fetch("/api/calendar/events");
      render(await resp.json());
    }

    const quickIn = document.getElementById("quick-input");
    const quickBtn = document.getElementById("quick-btn");

    quickBtn.addEventListener("click", async () => {
      const text = quickIn.value.trim();
      if (!text) { setStatus("Type what's happening first.", "error"); return; }
      quickBtn.disabled = true;
      setStatus("Reading that…");
      try {
        const resp = await fetch("/api/calendar/quick", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
        quickIn.value = "";
        const summary = (data.added || []).map(e => {
          const day = new Date(e.date + "T12:00:00").toLocaleDateString([], { weekday: "short", month: "numeric", day: "numeric" });
          return `${e.title} — ${day}${e.time ? " " + fmtTime(e.time) : ""}`;
        }).join(" · ");
        setStatus("Added ✓ " + summary, "ok");
        await refresh();
      } catch (e) {
        setStatus("Failed: " + e.message, "error");
      } finally {
        quickBtn.disabled = false;
      }
    });

    quickIn.addEventListener("keydown", (e) => {
      if (e.key === "Enter") quickBtn.click();
    });

    document.getElementById("add-btn").addEventListener("click", async () => {
      const title = titleIn.value.trim();
      if (!title) { setStatus("Give the event a name first.", "error"); return; }
      try {
        const resp = await fetch("/api/calendar/events", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, date: dateIn.value, time: timeIn.value }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }
        titleIn.value = "";
        timeIn.value = "";
        setStatus("Added ✓", "ok");
        await refresh();
      } catch (e) {
        setStatus("Failed: " + e.message, "error");
      }
    });

    titleIn.addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("add-btn").click();
    });

    eventsEl.addEventListener("click", async (e) => {
      const btn = e.target.closest(".event-del");
      if (!btn) return;
      await fetch("/api/calendar/events/" + btn.dataset.id, { method: "DELETE" });
      await refresh();
    });

    refresh().catch(e => setStatus("Couldn't load events: " + e.message, "error"));
  </script>
</body>
</html>
