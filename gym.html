<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Notepad — Life Hacker 3000</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { color: #6b6b8a; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .subtitle a { color: #a78bfa; text-decoration: none; }
    .subtitle a:hover { text-decoration: underline; }

    #note-input {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      color: #e8e8f0;
      border-radius: 10px;
      padding: 0.75rem 0.9rem;
      font-size: 0.95rem;
      width: 100%;
      min-height: 70px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      margin-bottom: 0.6rem;
    }
    #note-input:focus { border-color: #a78bfa; }

    .quick-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .quick-row input {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      color: #e8e8f0;
      border-radius: 10px;
      padding: 0.55rem 0.8rem;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }
    .quick-row input:focus { border-color: #a78bfa; }
    #exercise-input { flex: 2 1 180px; }
    #weight-input { flex: 1 1 100px; }

    .btn {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      color: #0f0f13;
      font-weight: 700;
      font-size: 0.9rem;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.5; cursor: wait; }

    .status { color: #6b6b8a; font-size: 0.85rem; margin: 0.75rem 0; min-height: 1.1em; }
    .status.error { color: #f87171; }
    .status.ok { color: #6ee7b7; }

    .notes-header {
      margin: 1.4rem 0 0.7rem;
      font-size: 1.05rem;
      color: #e8e8f0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .btn-secondary {
      background: #24243a;
      color: #d6c8ff;
      border: 1px solid #3a3a55;
      font-weight: 600;
      font-size: 0.8rem;
      border-radius: 8px;
      padding: 0.35rem 0.9rem;
      cursor: pointer;
    }
    .btn-secondary:hover { border-color: #a78bfa; }
    .btn-secondary:disabled { opacity: 0.5; cursor: wait; }

    .suggestion-card {
      background: #1a1a24;
      border: 1px solid #3a3a55;
      border-left: 3px solid #a78bfa;
      border-radius: 10px;
      padding: 0.8rem 0.9rem;
      margin-bottom: 0.6rem;
    }
    .suggestion-card.video { border-left-color: #60a5fa; }
    .kind-badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a78bfa;
    }
    .suggestion-card.video .kind-badge { color: #60a5fa; }
    .suggestion-title { font-weight: 700; font-size: 0.95rem; margin: 0.2rem 0 0.3rem; }
    .suggestion-why { color: #9a9ab5; font-size: 0.85rem; margin-bottom: 0.4rem; }
    .suggestion-how { font-size: 0.88rem; white-space: pre-wrap; margin-bottom: 0.5rem; }
    .suggestion-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .btn-approve {
      background: #16321f;
      color: #6ee7b7;
      border: 1px solid #1f5c38;
      border-radius: 8px;
      padding: 0.3rem 0.9rem;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-reject {
      background: #321616;
      color: #f87171;
      border: 1px solid #5c1f1f;
      border-radius: 8px;
      padding: 0.3rem 0.9rem;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .suggestion-source { font-size: 0.8rem; }
    .suggestion-source a { color: #60a5fa; text-decoration: none; }
    .suggestion-source a:hover { text-decoration: underline; }

    .routine-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .routine-name { font-weight: 700; font-size: 0.9rem; color: #d6c8ff; }
    .routine-detail { font-size: 0.85rem; color: #9a9ab5; flex: 1; }
    .routine-card a { color: #60a5fa; font-size: 0.8rem; text-decoration: none; }

    .note-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      margin-bottom: 0.6rem;
    }
    .note-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.35rem;
      font-size: 0.75rem;
    }
    .note-date { color: #6b6b8a; }
    .chip {
      background: #24243a;
      color: #d6c8ff;
      border-radius: 999px;
      padding: 0.1rem 0.55rem;
      font-weight: 600;
    }
    .chip.weight { color: #fcd34d; }
    .badge-new { color: #6ee7b7; font-weight: 600; }
    .note-text { font-size: 0.92rem; white-space: pre-wrap; }
    .note-del {
      margin-left: auto;
      background: none;
      border: none;
      color: #6b6b8a;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .note-del:hover { color: #f87171; }
    .empty { color: #6b6b8a; font-size: 0.9rem; }

    .progress-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .progress-table th {
      text-align: left;
      color: #6b6b8a;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.35rem 0.6rem;
      border-bottom: 1px solid #2a2a3a;
    }
    .progress-table td { padding: 0.45rem 0.6rem; border-bottom: 1px solid #22222e; color: #b8b8cc; }
    .progress-table td.ex { color: #d6c8ff; font-weight: 700; }
    .progress-table td.num { color: #e8e8f0; }
    .delta-up { color: #6ee7b7; font-weight: 700; }
    .delta-down { color: #f87171; font-weight: 700; }
    .delta-flat { color: #6b6b8a; }
    .history { color: #9a9ab5; font-size: 0.8rem; white-space: nowrap; }
    .progress-wrap { overflow-x: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gym Notepad</h1>
    <p class="subtitle">
      Jot rough notes during or after a session — review comes before your next one.
      <a href="/">🏠 Home</a> &middot; <a href="/planner">Planner</a> &middot; <a href="/calendar">Calendar</a> &middot; <a href="/notes">Notes</a>
    </p>

    <textarea id="note-input" placeholder="tried something different today, liked it…"></textarea>
    <div class="quick-row">
      <input id="exercise-input" list="exercise-list" placeholder="exercise (optional)" />
      <datalist id="exercise-list"></datalist>
      <input id="weight-input" type="number" step="0.5" min="0" placeholder="weight (lb)" />
      <button class="btn" id="save-btn">Save note</button>
    </div>
    <div class="status" id="status"></div>

    <div id="suggestions-block" style="display:none">
      <h2 class="notes-header">Suggestions</h2>
      <div id="suggestions-list"></div>
    </div>

    <div id="routine-block" style="display:none">
      <h2 class="notes-header">Routine</h2>
      <div id="routine-list"></div>
    </div>

    <div id="progress-block" style="display:none">
      <h2 class="notes-header">Progress</h2>
      <div class="progress-wrap"><table class="progress-table">
        <thead><tr><th>Exercise</th><th>First</th><th>Latest</th><th>Change</th><th>History</th></tr></thead>
        <tbody id="progress-body"></tbody>
      </table></div>
    </div>

    <h2 class="notes-header">
      Session notes
      <button class="btn-secondary" id="review-btn">Review notes</button>
    </h2>
    <div id="notes-list"><p class="empty">Loading…</p></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (cls ? " " + cls : "");
    }

    const esc = (s) => s.replace(/[&<>"']/g, c => `&#${c.charCodeAt(0)};`);

    function renderRoutine(data) {
      const block = $("routine-block");
      const routine = data.routine || [];
      block.style.display = routine.length ? "" : "none";
      $("routine-list").innerHTML = routine.map(r => `
        <div class="routine-card">
          <span class="routine-name">${esc(r.exercise)}</span>
          <span class="routine-detail">${esc(r.detail || "")}</span>
          ${r.source ? `<a href="${esc(r.source)}" target="_blank" rel="noopener">video</a>` : ""}
          <button class="note-del" data-exercise="${esc(r.exercise)}" title="remove">✕</button>
        </div>`).join("");
      $("routine-list").querySelectorAll(".note-del").forEach(btn => {
        btn.onclick = async () => {
          const resp = await fetch(`/api/gym/routine/${encodeURIComponent(btn.dataset.exercise)}`, { method: "DELETE" });
          render(await resp.json());
        };
      });
    }

    function renderSuggestions(data) {
      const block = $("suggestions-block");
      const pending = ((data.review || {}).suggestions || []).filter(s => s.status === "pending");
      block.style.display = pending.length ? "" : "none";
      $("suggestions-list").innerHTML = pending.map(s => `
        <div class="suggestion-card ${s.kind}">
          <span class="kind-badge">${s.kind === "video" ? "from a video" : "from your notes"}</span>
          <div class="suggestion-title">${esc(s.title)}</div>
          ${s.why ? `<div class="suggestion-why">${esc(s.why)}</div>` : ""}
          ${s.how ? `<div class="suggestion-how">${esc(s.how)}</div>` : ""}
          <div class="suggestion-actions">
            <button class="btn-approve" data-id="${s.id}" data-decision="approve">${s.routine_entry ? "Add to routine" : "Got it"}</button>
            <button class="btn-reject" data-id="${s.id}" data-decision="reject">Skip</button>
            ${s.source ? `<span class="suggestion-source"><a href="${esc(s.source)}" target="_blank" rel="noopener">watch the video</a></span>` : ""}
          </div>
        </div>`).join("");
      $("suggestions-list").querySelectorAll("button[data-id]").forEach(btn => {
        btn.onclick = async () => {
          btn.disabled = true;
          const resp = await fetch(`/api/gym/review/${btn.dataset.id}/${btn.dataset.decision}`, { method: "POST" });
          render(await resp.json());
        };
      });
    }

    function renderProgress(data) {
      // Weight progression per exercise, from notes logged with the quick-add fields
      const block = $("progress-block");
      const groups = {};
      for (const n of data.notes || []) {
        if (!n.exercise || n.weight == null) continue;
        const key = n.exercise.trim().toLowerCase();
        (groups[key] = groups[key] || { name: n.exercise.trim(), points: [] }).points.push(n);
      }
      const rows = Object.values(groups);
      block.style.display = rows.length ? "" : "none";
      if (!rows.length) return;

      const fmt = (w) => `${w} lb`;
      $("progress-body").innerHTML = rows
        .map(g => {
          g.points.sort((a, b) => a.date.localeCompare(b.date));
          g.name = g.points[g.points.length - 1].exercise.trim();  // latest casing wins
          return g;
        })
        .sort((a, b) => b.points[b.points.length - 1].date.localeCompare(a.points[a.points.length - 1].date))
        .map(g => {
          const first = g.points[0].weight, latest = g.points[g.points.length - 1].weight;
          const delta = Math.round((latest - first) * 10) / 10;
          const deltaCls = delta > 0 ? "delta-up" : delta < 0 ? "delta-down" : "delta-flat";
          const deltaTxt = g.points.length < 2 ? "—" : (delta > 0 ? "+" : "") + delta + " lb";
          const history = g.points.slice(-6).map(p => p.weight).join(" → ")
            + (g.points.length > 6 ? " (last 6)" : "");
          return `<tr><td class="ex">${esc(g.name)}</td><td class="num">${fmt(first)}</td>` +
                 `<td class="num">${fmt(latest)}</td><td class="${deltaCls}">${deltaTxt}</td>` +
                 `<td class="history">${history}</td></tr>`;
        }).join("");
    }

    function render(data) {
      renderRoutine(data);
      renderSuggestions(data);
      renderProgress(data);
      const list = $("notes-list");
      const notes = (data.notes || []).slice().reverse();
      // seed the exercise autocomplete from the routine + exercises already logged
      const seen = [...new Set([
        ...(data.routine || []).map(r => r.exercise),
        ...notes.map(n => n.exercise),
      ].filter(Boolean))];
      $("exercise-list").innerHTML = seen.map(e => `<option value="${esc(e)}">`).join("");
      if (!notes.length) {
        list.innerHTML = '<p class="empty">No notes yet — log your first session thought above.</p>';
        return;
      }

      list.innerHTML = notes.map(n => `
        <div class="note-card">
          <div class="note-meta">
            <span class="note-date">${new Date(n.date).toLocaleString([], { dateStyle: "medium", timeStyle: "short" })}</span>
            ${n.exercise ? `<span class="chip">${esc(n.exercise)}</span>` : ""}
            ${n.weight != null ? `<span class="chip weight">${n.weight} lb</span>` : ""}
            <span class="badge-new">${n.status}</span>
            <button class="note-del" data-id="${n.id}" title="delete">✕</button>
          </div>
          ${n.text ? `<div class="note-text"></div>` : ""}
        </div>`).join("");

      // set note text via textContent so user input is never parsed as HTML
      const cards = list.querySelectorAll(".note-card");
      notes.forEach((n, i) => {
        const el = cards[i].querySelector(".note-text");
        if (el) el.textContent = n.text;
      });

      list.querySelectorAll(".note-del").forEach(btn => {
        btn.onclick = async () => {
          await fetch(`/api/gym/notes/${btn.dataset.id}`, { method: "DELETE" });
          load();
        };
      });
    }

    async function load() {
      const resp = await fetch("/api/gym/notes");
      render(await resp.json());
    }

    $("save-btn").onclick = async () => {
      const payload = {
        text: $("note-input").value,
        exercise: $("exercise-input").value,
        weight: $("weight-input").value,
      };
      $("save-btn").disabled = true;
      setStatus("Saving…");
      try {
        const resp = await fetch("/api/gym/notes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) {
          const err = await resp.json();
          setStatus(err.detail || "Save failed", "error");
        } else {
          $("note-input").value = "";
          $("exercise-input").value = "";
          $("weight-input").value = "";
          setStatus("Saved.", "ok");
          load();
        }
      } catch (e) {
        setStatus("Save failed: " + e.message, "error");
      } finally {
        $("save-btn").disabled = false;
      }
    };

    $("review-btn").onclick = async () => {
      const btn = $("review-btn");
      btn.disabled = true;
      setStatus("Reviewing notes against your routine and saved videos…");
      try {
        const resp = await fetch("/api/gym/review", { method: "POST" });
        const data = await resp.json();
        if (!resp.ok) {
          setStatus(data.detail || "Review failed", "error");
        } else {
          const n = ((data.review || {}).suggestions || []).filter(s => s.status === "pending").length;
          setStatus(n ? `${n} suggestion${n === 1 ? "" : "s"} ready below.` : "Reviewed — no suggestions this time.", "ok");
          render(data);
        }
      } catch (e) {
        setStatus("Review failed: " + e.message, "error");
      } finally {
        btn.disabled = false;
      }
    };

    load();
  </script>
</body>
</html>
